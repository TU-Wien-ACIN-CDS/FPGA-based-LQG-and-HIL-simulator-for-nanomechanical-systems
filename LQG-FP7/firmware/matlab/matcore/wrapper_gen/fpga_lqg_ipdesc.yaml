
# Datatypes used in this file need to be defined here.
datatypes:
  ufix_4_0:
    size: 4
    signed: false
    fixpt_bin: 0

  ufix_8_0:
    size: 8
    signed: false
    fixpt_bin: 0

  sfix_14_12:
    size: 14
    signed: true
    fixpt_bin: 12

  sfix_18_14:
    size: 18
    signed: true
    fixpt_bin: 14

  sfix_25_22:
    size: 25
    signed: true
    fixpt_bin: 22

  logic_1:
    size: 1

ipcores:
  # Define the IP core "fpga_lqg_t1"
  fpga_lqg_t1_wrapper:
    # This the actual name of the ipcore Verilog wrapper generated by VMC
    ipcore_type_name: FPGA_LQG_Scaling_Test_0
    passthrough_axi: false

    # Note: current config: 2232 bits / 279 bytes

    # Input gateways.
    inputs:
      # Clock
      clk:
        datatype: logic_1
        signal_map:
          name: LQG_clk

      # Kalman filter matrices
      LQG_F_res_gw:
        datatype: sfix_18_14
        ssr: 49
        config_map:
          offset: 0
          stride: 24
        attributes:
          matlab_name: F_ip_residue

      LQG_F_shift_gw:
        datatype: ufix_4_0
        ssr: 49
        config_map:
          offset: 1176 # 147*8
          stride: 4
        attributes:
          matlab_name: F_ip_shift

      LQG_Gamma_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 1376 # 172*8
          stride: 18
        attributes:
          matlab_name: Gamma_ip_residue

      LQG_Gamma_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 1632 # 204*8
          stride: 4
        attributes:
          matlab_name: Gamma_ip_shift

      LQG_L_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 1688 # 211*8
          stride: 18
        attributes:
          matlab_name: L_ip_residue

      LQG_L_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 1944 # 243*8
          stride: 4
        attributes:
          matlab_name: L_ip_shift

      # LQR controller matrix
      LQG_K_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 2000 # 250*8
          stride: 18
        attributes:
          matlab_name: K_ip_residue

      LQG_K_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 2176 # 272*8
          stride: 4
        attributes:
          matlab_name: K_ip_shift

      # Plant sensor input
      yk_gw:
        datatype: sfix_14_12
        ssr: 2
        signal_map:
          name: LQG_yk_%d
          ssr_pack: false

      # In- and output calibration
      yk_offset_gw:
        datatype: sfix_14_12
        ssr: 2
        config_map:
          offset: 2232 # 279*8
          stride: 14
        attributes:
          matlab_name: yk_offset

      yk_factor_gw:
        datatype: sfix_18_14
        ssr: 2
        config_map:
          offset: 2264 # 283*8
          stride: 18
        attributes:
          matlab_name: yk_factor

      uk_offset_gw:
        datatype: sfix_14_12
        ssr: 2
        config_map:
          offset: 2304 # 288*8
          stride: 14
        attributes:
          matlab_name: uk_offset

      uk_factor_gw:
        datatype: sfix_18_14
        ssr: 2
        config_map:
          offset: 2336 # 292*8
          stride: 18
        attributes:
          matlab_name: uk_factor

      # LED passthrough input
      LQG_led_in:
        datatype: ufix_8_0
        config_map:
          offset: 2376 # 297*8
        attributes:
          matlab_name: led

    # Output gateways.
    outputs:
      # Feedback output
      uk_gw:
        datatype: sfix_14_12
        ssr: 2
        signal_map:
          name: LQG_uk_%d
          ssr_pack: false

      # Estimated state output
      xkhat_gw:
        datatype: sfix_25_22
        ssr: 7
        # No ext signal assigned, this will be ignored.

      # LED passthrough output
      LQG_led_out:
        datatype: ufix_8_0
        signal_map:
          name: LQG_led_out