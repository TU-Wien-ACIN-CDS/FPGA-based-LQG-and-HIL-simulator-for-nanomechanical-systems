
# Datatypes used in this file need to be defined here.
datatypes:
  ufix_4_0:
    size: 4
    signed: false
    fixpt_bin: 0

  ufix_8_0:
    size: 8
    signed: false
    fixpt_bin: 0

  sfix_14_12:
    size: 14
    signed: true
    fixpt_bin: 12

  sfix_18_14:
    size: 18
    signed: true
    fixpt_bin: 14

  sfix_25_22:
    size: 25
    signed: true
    fixpt_bin: 22

  logic_1:
    size: 1

ipcores:
  lqg_axi_test_wrapper:
    # This the actual name of the ipcore Verilog wrapper generated by VMC
    ipcore_type_name: lqg_axi_test_0

    memory_map:
      config_ram:
        base: 0x80000000
        size: 0x2000
      loader:
        base: 0x80002000
        size: 0x1000
      axi:
        axi_sys_s_axi:
          base: 0x80003000
          size: 0x1000
      dma:
        bram:
          base: 0x40000000
          size: 0x2000
        throttle:
          base: 0x40002000
          size: 0x1000
        dmacore:
          base: 0x40400000
          size: 0x10000
        dma_target:
          base: 0x10000000
          size: 0x10000000
    
    axi_interfaces:
      # VMC names the bus as <subsystem>_s_axi
      # In case of doubt, names can be found out by placing the generated IP core into any block design and looking at the signal names.
      axi_sys_s_axi:
        data_width: 32
        addr_width: 3
        clock: axi_sys_clk # *external* signal name of the AXI clock signal
        
        inputs:
          axi_led_mask:
            datatype: ufix_8_0
            offset: 0x00

        outputs:
          axi_led_output:
            datatype: ufix_8_0
            offset: 0x04

    # Input gateways.
    inputs:
      # Clock
      proc_sys_clk:
        datatype: logic_1
        signal_map:
          name: proc_sys_clk
          is_clock: true
          freq: 15625000

      axi_sys_clk:
        datatype: logic_1
        signal_map:
          name: axi_sys_clk
          is_clock: true
          freq: 125000000

      # Reset lines (required for AXI)
      axi_sys_aresetn:
        datatype: logic_1
        signal_map:
          name: axi_sys_aresetn
          active_low: true

      # Kalman filter matrices
      LQG_F_res_gw:
        datatype: sfix_18_14
        ssr: 49
        config_map:
          offset: 0
          stride: 24
        attributes:
          matlab_name: F_ip_residue

      LQG_F_shift_gw:
        datatype: ufix_4_0
        ssr: 49
        config_map:
          offset: 1176 # 147*8
          stride: 4
        attributes:
          matlab_name: F_ip_shift

      LQG_Gamma_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 1376 # 172*8
          stride: 18
        attributes:
          matlab_name: Gamma_ip_residue

      LQG_Gamma_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 1632 # 204*8
          stride: 4
        attributes:
          matlab_name: Gamma_ip_shift

      LQG_L_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 1688 # 211*8
          stride: 18
        attributes:
          matlab_name: L_ip_residue

      LQG_L_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 1944 # 243*8
          stride: 4
        attributes:
          matlab_name: L_ip_shift

      # LQR controller matrix
      LQG_K_res_gw:
        datatype: sfix_18_14
        ssr: 14
        config_map:
          offset: 2000 # 250*8
          stride: 18
        attributes:
          matlab_name: K_ip_residue

      LQG_K_shift_gw:
        datatype: ufix_4_0
        ssr: 14
        config_map:
          offset: 2176 # 272*8
          stride: 4
        attributes:
          matlab_name: K_ip_shift

      # Plant sensor input
      yk_gw:
        datatype: sfix_14_12
        ssr: 2
        signal_map:
          name: LQG_yk_%d
          ssr_pack: false

      # In- and output calibration
      yk_offset_gw:
        datatype: sfix_14_12
        ssr: 2
        config_map:
          offset: 2232 # 279*8
          stride: 14
        attributes:
          matlab_name: yk_offset

      yk_factor_gw:
        datatype: sfix_18_14
        ssr: 2
        config_map:
          offset: 2264 # 283*8
          stride: 18
        attributes:
          matlab_name: yk_factor

      uk_offset_gw:
        datatype: sfix_14_12
        ssr: 2
        config_map:
          offset: 2304 # 288*8
          stride: 14
        attributes:
          matlab_name: uk_offset

      uk_factor_gw:
        datatype: sfix_18_14
        ssr: 2
        config_map:
          offset: 2336 # 292*8
          stride: 18
        attributes:
          matlab_name: uk_factor

      # LED passthrough input
      LQG_led_in:
        datatype: ufix_8_0
        config_map:
          offset: 2376 # 297*8
        attributes:
          matlab_name: led

    # Output gateways.
    outputs:
      # Feedback output
      uk_gw:
        datatype: sfix_14_12
        ssr: 2
        signal_map:
          name: LQG_uk_%d
          ssr_pack: false

      # Estimated state output
      xkhat_gw:
        datatype: sfix_25_22
        ssr: 7
        # No ext signal assigned, this will be ignored.

      # LED passthrough output
      LQG_led_out:
        datatype: ufix_8_0
        signal_map:
          name: LQG_led_out